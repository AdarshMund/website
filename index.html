<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps by Adarsh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    header {
      text-align: center;
      padding: 60px 20px;
    }

    header h1 {
      font-size: 3.5rem;
      font-weight: bold;
      background: linear-gradient(90deg, #00dbde, #fc00ff);
      -webkit-background-clip: text;
      color: transparent;
    }

    header p {
      margin-top: 10px;
      font-size: 1.2rem;
      color: #ccc;
    }

    .container {
      padding: 40px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 25px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .card img {
      width: 60px;
      height: 60px;
      margin-bottom: 10px;
    }

    .card h3 {
      margin-top: 10px;
      font-size: 1.2rem;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: rgba(0,0,0,0.3);
      color: #aaa;
    }

    /* Animations */
    .fade-in {
      animation: fadeIn 2s ease-in;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

  </style>
</head>
<body>

  <header class="fade-in">
    <h1>DEVOPS BY ADARSH</h1>
    <p>Automation | CI/CD | Cloud | Infrastructure as Code</p>
  </header>

  <div class="container">
    <div class="tools-grid">

      <div class="card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg">
        <h3>Docker</h3>
      </div>

      <div class="card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/kubernetes/kubernetes-plain.svg">
        <h3>Kubernetes</h3>
      </div>

      <div class="card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/jenkins/jenkins-original.svg">
        <h3>Jenkins</h3>
      </div>

      <div class="card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/terraform/terraform-original.svg">
        <h3>Terraform</h3>
      </div>

      <div class="card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/aws/aws-original.svg">
        <h3>AWS</h3>
      </div>

      <div class="card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg">
        <h3>Git</h3>
      </div>

      <div class="card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linux/linux-original.svg">
        <h3>Linux</h3>
      </div>

      <div class="card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/prometheus/prometheus-original.svg">
        <h3>Prometheus</h3>
      </div>

      <div class="card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/grafana/grafana-original.svg">
        <h3>Grafana</h3>
      </div>

      <div class="card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nginx/nginx-original.svg">
        <h3>Nginx</h3>
      </div>

    </div>
  </div>

  <footer>
    © 2026 DevOps by Adarsh | Built with ❤️
  </footer>

</body>
</html>
