<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEBULA SYNC | Real-time Cosmic Energy Visualizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', 'Orbitron', 'Courier New', monospace;
      overflow: hidden;
      position: relative;
      touch-action: none;
    }

    /* main canvas container */
    .universe {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none; /* so UI buttons are clickable */
    }

    /* futuristic HUD overlay */
    .hud {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-end;
      gap: 15px;
      pointer-events: none;
    }

    .data-panel {
      background: rgba(10, 20, 35, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      border: 1px solid rgba(0, 255, 255, 0.5);
      padding: 12px 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      font-weight: 500;
      letter-spacing: 1px;
      pointer-events: auto;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #0ff;
      text-shadow: 0 0 5px #0ff;
      font-size: 0.9rem;
    }

    .pulse {
      width: 12px;
      height: 12px;
      background-color: #0f0;
      border-radius: 50%;
      box-shadow: 0 0 8px #0f0;
      animation: pulse-anim 1.2s infinite;
    }

    @keyframes pulse-anim {
      0% { opacity: 0.4; transform: scale(0.8);}
      100% { opacity: 1; transform: scale(1.2);}
    }

    .stats {
      display: flex;
      gap: 32px;
      font-family: 'Orbitron', monospace;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #9dc6ff;
      letter-spacing: 2px;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 8px cyan;
      line-height: 1;
    }

    .energy-wave {
      background: rgba(0, 30, 40, 0.6);
      border-radius: 40px;
      padding: 8px 20px;
      border-left: 4px solid #ff55ff;
    }

    .energy-value {
      font-size: 1.4rem;
      font-weight: bold;
      background: linear-gradient(135deg, #aaffff, #ff88ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    button {
      background: rgba(0, 20, 40, 0.8);
      border: 1px solid cyan;
      padding: 8px 20px;
      border-radius: 60px;
      color: cyan;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: 0.2s;
      pointer-events: auto;
    }

    button:hover {
      background: cyan;
      color: #010101;
      box-shadow: 0 0 20px cyan;
      border-color: white;
    }

    .title {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 2px;
      color: #ccf;
      border: 1px solid rgba(0,255,255,0.3);
      pointer-events: none;
    }

    @media (max-width: 700px) {
      .stat-value { font-size: 1.2rem; }
      .stats { gap: 15px; }
      .data-panel { padding: 8px 16px; }
      .energy-value { font-size: 1rem; }
    }

    .footer {
      position: absolute;
      bottom: 12px;
      right: 20px;
      font-size: 10px;
      color: #4f6f8f;
      z-index: 20;
      background: rgba(0,0,0,0.3);
      padding: 2px 8px;
      border-radius: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="universe">
  <canvas id="cosmicCanvas"></canvas>
  <div class="title">
    ✦ NEBULA SYNC • REAL-TIME ENERGY FIELD ✦
  </div>
  <div class="hud">
    <div class="data-panel">
      <div class="live-badge">
        <span class="pulse"></span>
        <span>LIVE COSMIC STREAM</span>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">PARTICLE FLUX</div>
          <div class="stat-value" id="particleCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">FREQUENCY (Hz)</div>
          <div class="stat-value" id="frequencyVal">0.00</div>
        </div>
      </div>
    </div>
    <div class="data-panel energy-wave">
      <div style="display: flex; gap: 12px; align-items: baseline;">
        <span style="font-size: 0.8rem;">⚡ QUANTUM ENERGY</span>
        <span class="energy-value" id="energyLevel">98.3</span>
        <span style="font-size: 0.8rem;">ZJ</span>
      </div>
      <div style="width: 180px; height: 4px; background: #1a2a3a; border-radius: 4px; margin-top: 6px;">
        <div id="energyBar" style="width: 98%; height: 100%; background: linear-gradient(90deg, cyan, magenta); border-radius: 4px;"></div>
      </div>
    </div>
    <div>
      <button id="resetBtn">⟳ RESONANCE BOOST</button>
    </div>
  </div>
  <div class="footer">
    REALTIME DATA • DYNAMIC PARTICLE FIELD • INTERACTIVE AETHER
  </div>
</div>

<script>
  (function(){
    // --------------------------------------------------------------
    //  REAL-TIME EXCITING INDEX: "NEBULA SYNC" 
    //  - Dynamic particle system with mouse/touch interaction
    //  - Simulated real-time cosmic data (energy, frequency, flux)
    //  - Particles respond to audio-reactive-like motion (no audio, but generative)
    //  - Fluid colors, evolving field, mesmerizing visuals
    // --------------------------------------------------------------
    const canvas = document.getElementById('cosmicCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const particleCountSpan = document.getElementById('particleCount');
    const frequencyValSpan = document.getElementById('frequencyVal');
    const energyLevelSpan = document.getElementById('energyLevel');
    const energyBarDiv = document.getElementById('energyBar');
    const resetBtn = document.getElementById('resetBtn');

    // Canvas dimensions
    let width, height;
    
    // Particle array
    let particles = [];
    const PARTICLE_COUNT = 280;   // base count, will be dynamic-ish
    
    // Global real-time state
    let time = 0;
    let lastTimestamp = 0;
    let frame = 0;
    
    // simulated cosmic metrics
    let cosmicEnergy = 72.4;      // range 20 - 145
    let frequency = 7.83;         // schumann resonance inspired, variable
    let targetFrequency = 7.83;
    
    // mouse / touch interaction (creates force fields)
    let mouseX = -1000, mouseY = -1000;
    let mouseActive = false;
    let touchActive = false;
    
    // for smooth energy drift & realtime excitement
    let energyVelocity = 0;
    
    // particle movement parameters
    const FORCE_STRENGTH = 0.28;
    const EDGE_BUFFER = 40;
    
    // colors dynamic palette
    let hueShift = 0;
    
    // initialize particles with interesting initial positions & velocities
    function initParticles(count) {
      const newParticles = [];
      for(let i = 0; i < count; i++) {
        // spread across canvas, but also some clustered zones for beauty
        let x, y;
        if(Math.random() > 0.6) {
          x = width * 0.2 + Math.random() * width * 0.6;
          y = height * 0.2 + Math.random() * height * 0.6;
        } else {
          x = Math.random() * width;
          y = Math.random() * height;
        }
        newParticles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 1.2,
          vy: (Math.random() - 0.5) * 1.2,
          size: 2 + Math.random() * 5,
          baseHue: Math.random() * 360,
          phase: Math.random() * Math.PI * 2,
          alpha: 0.6 + Math.random() * 0.4,
          orbitRadius: 0,  // not used, but for variety
        });
      }
      return newParticles;
    }
    
    // resize handler
    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      // reinitialize particles on resize for proper distribution
      particles = initParticles(PARTICLE_COUNT);
      // also update displayed count
      particleCountSpan.innerText = particles.length;
    }
    
    // update realtime metrics using noise & user interaction & frame based modulation
    function updateMetrics(deltaTime) {
      // deltaTime in ms, smooth changes ~60fps -> delta 16ms typical
      const dt = Math.min(0.033, deltaTime / 1000);
      
      // Frequency drifts like natural resonance + mouse influence
      let freqDelta = (Math.sin(time * 0.37) * 0.08) + (Math.cos(time * 0.71) * 0.04);
      if(mouseActive || touchActive) {
        // mouse presence boosts frequency & energy: interactive excitement
        freqDelta += 0.12;
      }
      targetFrequency = Math.min(24.0, Math.max(3.2, 7.83 + freqDelta * 2.5));
      frequency += (targetFrequency - frequency) * (dt * 5);
      
      // Energy dynamics: based on frequency and particle activity and mouse
      let energyTarget = 35 + (frequency - 3) * 4.5;
      if(mouseActive) energyTarget += 18;
      energyTarget = Math.min(148, Math.max(22, energyTarget));
      energyVelocity += (energyTarget - cosmicEnergy) * dt * 4.5;
      energyVelocity *= (1 - dt * 2);
      cosmicEnergy += energyVelocity * dt;
      cosmicEnergy = Math.min(152, Math.max(18, cosmicEnergy));
      
      // update UI
      energyLevelSpan.innerText = cosmicEnergy.toFixed(1);
      let percent = (cosmicEnergy - 18) / (152 - 18) * 100;
      percent = Math.min(100, Math.max(0, percent));
      energyBarDiv.style.width = percent + "%";
      frequencyValSpan.innerText = frequency.toFixed(2);
      
      // particle count dynamic: show realtime "flux" - but number of particles stays constant, we display flux index based on velocity
      // let's compute average speed as flux
      let avgSpeed = 0;
      for(let p of particles) {
        avgSpeed += Math.hypot(p.vx, p.vy);
      }
      avgSpeed = avgSpeed / particles.length;
      let fluxIndex = (avgSpeed * 3.8).toFixed(0);
      particleCountSpan.innerText = fluxIndex;
    }
    
    // update particle physics: flow field based on sine/cosine & mouse influence
    function updateParticles(deltaTime) {
      const dt = Math.min(0.033, deltaTime / 1000);
      const forceMult = FORCE_STRENGTH * dt * 8;
      
      // frequency influences particle agitation: more frequency = more turbulent motion
      const turbulence = 0.6 + (frequency / 20) * 1.4;
      
      for(let p of particles) {
        // cosmic wind using perlin-like sin/cos functions
        const angleX = time * 0.37 + p.y * 0.003;
        const angleY = time * 0.53 + p.x * 0.002;
        let ax = Math.sin(angleX) * 0.25 * turbulence;
        let ay = Math.cos(angleY) * 0.25 * turbulence;
        
        // mouse repulsion/attraction: creates a "gravity well" or disturbance field
        if(mouseActive && mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
          const dx = p.x - mouseX;
          const dy = p.y - mouseY;
          const distSq = dx*dx + dy*dy;
          const dist = Math.sqrt(distSq) + 0.001;
          // repulsive radial force that pushes particles away, like energy vortex
          const forceMag = 45.0 / (distSq + 80);
          ax += dx / dist * forceMag * (cosmicEnergy / 70);
          ay += dy / dist * forceMag * (cosmicEnergy / 70);
        }
        
        // additional oscillating global resonance (frequency based)
        const resonantForceX = Math.sin(time * frequency * 0.9) * 0.12 * (cosmicEnergy/60);
        const resonantForceY = Math.cos(time * frequency * 0.7) * 0.12 * (cosmicEnergy/60);
        ax += resonantForceX;
        ay += resonantForceY;
        
        p.vx += ax * forceMult;
        p.vy += ay * forceMult;
        
        // damping & max speed
        p.vx *= 0.992;
        p.vy *= 0.992;
        const maxSpeed = 4.2 + turbulence * 1.3;
        let spd = Math.hypot(p.vx, p.vy);
        if(spd > maxSpeed) {
          p.vx = (p.vx / spd) * maxSpeed;
          p.vy = (p.vy / spd) * maxSpeed;
        }
        
        // update position
        p.x += p.vx * dt * 70;
        p.y += p.vy * dt * 70;
        
        // wrap around edges with artistic effect (teleport to opposite side for infinite flow)
        if(p.x < -EDGE_BUFFER) p.x = width + EDGE_BUFFER;
        if(p.x > width + EDGE_BUFFER) p.x = -EDGE_BUFFER;
        if(p.y < -EDGE_BUFFER) p.y = height + EDGE_BUFFER;
        if(p.y > height + EDGE_BUFFER) p.y = -EDGE_BUFFER;
        
        // update color phase based on speed and energy
        p.phase += (Math.hypot(p.vx, p.vy) * 0.05 + 0.01);
      }
    }
    
    // draw everything with glowing, energetic style
    function draw() {
      if(!ctx) return;
      // clear with semi-transparent to create trailing effect (motion blur)
      ctx.fillStyle = "rgba(3, 8, 18, 0.25)";
      ctx.fillRect(0, 0, width, height);
      
      // draw a subtle radial gradient background (cosmic aura)
      const grad = ctx.createRadialGradient(width/2, height/2, 30, width/2, height/2, width*0.7);
      grad.addColorStop(0, "rgba(20, 30, 70, 0.2)");
      grad.addColorStop(1, "rgba(0, 0, 0, 0.6)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);
      
      // draw connecting lines between close particles for "energy web" effect
      ctx.beginPath();
      ctx.lineWidth = 0.8;
      const connectionDist = 75 + (Math.sin(time * 0.5) * 8);
      for(let i = 0; i < particles.length; i++) {
        for(let j = i+1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.hypot(dx, dy);
          if(dist < connectionDist) {
            const intensity = 1 - (dist / connectionDist);
            const alphaLine = intensity * 0.25 * (cosmicEnergy/100);
            const hueLine = (hueShift + (particles[i].baseHue + particles[j].baseHue)/2) % 360;
            ctx.strokeStyle = `hsla(${hueLine}, 85%, 65%, ${alphaLine})`;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      
      // draw each particle with glow & dynamic colors
      for(let p of particles) {
        // color influenced by speed, energy, and time
        const speedFactor = Math.min(1, Math.hypot(p.vx, p.vy) / 3.5);
        const dynamicHue = (p.baseHue + time * 25 + speedFactor * 120 + cosmicEnergy) % 360;
        const sat = 75 + speedFactor * 25;
        let light = 55 + speedFactor * 25;
        // energy boost makes particles more incandescent
        const energyGlow = cosmicEnergy / 90;
        const radius = p.size * (0.8 + Math.sin(p.phase) * 0.2) * (0.7 + energyGlow * 0.7);
        
        // outer glow
        ctx.shadowBlur = 12;
        ctx.shadowColor = `hsl(${dynamicHue}, 100%, 65%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius + 1.5, 0, Math.PI*2);
        ctx.fillStyle = `hsla(${dynamicHue}, ${sat}%, ${light}%, 0.25)`;
        ctx.fill();
        
        // core particle
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI*2);
        ctx.fillStyle = `hsla(${dynamicHue}, ${sat}%, ${light+10}%, 0.95)`;
        ctx.fill();
        
        // tiny inner spark
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius*0.4, 0, Math.PI*2);
        ctx.fillStyle = `rgb(255, 255, 220)`;
        ctx.fill();
      }
      // reset shadow
      ctx.shadowBlur = 0;
      
      // draw interactive mouse field effect if active
      if(mouseActive && mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 32 + Math.sin(time * 15)*5, 0, Math.PI*2);
        ctx.fillStyle = `rgba(0, 255, 200, 0.12)`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 15, 0, Math.PI*2);
        ctx.fillStyle = `rgba(100, 255, 200, 0.3)`;
        ctx.fill();
      }
      
      // draw extra floating energy text or wave effect (just for style)
      ctx.font = "400 12px 'Orbitron'";
      ctx.fillStyle = `rgba(180, 240, 255, 0.5)`;
      ctx.shadowBlur = 0;
      ctx.fillText(`⚡ RESONANCE MODE : ${frequency.toFixed(2)} Hz`, width - 170, height - 18);
    }
    
    // update everything each frame
    let lastFrameTime = performance.now();
    function animate(now) {
      const delta = Math.min(100, now - lastFrameTime);
      if(delta > 0) {
        const deltaSec = delta / 1000;
        // update global time
        time += deltaSec * 1.2;
        hueShift = (hueShift + 0.5) % 360;
        
        updateMetrics(delta);
        updateParticles(delta);
        draw();
      }
      lastFrameTime = now;
      requestAnimationFrame(animate);
    }
    
    // ---- Mouse / Touch tracking for interactive force field ----
    function handleMouseMove(e) {
      mouseX = e.clientX;
      mouseY = e.clientY;
      mouseActive = true;
      touchActive = false;
      // auto reset inactive after some time? we keep until leave
    }
    function handleMouseLeave() {
      mouseActive = false;
      mouseX = -1000;
    }
    function handleTouchStart(e) {
      e.preventDefault();
      if(e.touches.length) {
        mouseX = e.touches[0].clientX;
        mouseY = e.touches[0].clientY;
        mouseActive = true;
        touchActive = true;
      }
    }
    function handleTouchMove(e) {
      e.preventDefault();
      if(e.touches.length) {
        mouseX = e.touches[0].clientX;
        mouseY = e.touches[0].clientY;
        mouseActive = true;
        touchActive = true;
      }
    }
    function handleTouchEnd(e) {
      e.preventDefault();
      mouseActive = false;
      touchActive = false;
      mouseX = -1000;
    }
    
    // reset / boost effect: adds energy burst & reset some particle velocities outward
    function resonanceBoost() {
      // increase cosmic energy abruptly
      cosmicEnergy = Math.min(152, cosmicEnergy + 28);
      energyVelocity += 12;
      // give particles a radial outward burst from center
      const centerX = width/2;
      const centerY = height/2;
      for(let p of particles) {
        const dx = p.x - centerX;
        const dy = p.y - centerY;
        const dist = Math.hypot(dx, dy) + 0.1;
        const angle = Math.atan2(dy, dx);
        const force = 3.5;
        p.vx += Math.cos(angle) * force;
        p.vy += Math.sin(angle) * force;
        // limit speed
        let spd = Math.hypot(p.vx, p.vy);
        if(spd > 6.2) {
          p.vx = (p.vx / spd) * 6.0;
          p.vy = (p.vy / spd) * 6.0;
        }
      }
      // also boost frequency momentarily
      targetFrequency += 2.2;
      setTimeout(() => {
        targetFrequency = Math.min(24, targetFrequency - 1.1);
      }, 400);
    }
    
    // attach event listeners and init
    window.addEventListener('resize', () => {
      resizeCanvas();
    });
    canvas.parentElement.addEventListener('mousemove', handleMouseMove);
    canvas.parentElement.addEventListener('mouseleave', handleMouseLeave);
    canvas.parentElement.addEventListener('touchstart', handleTouchStart, {passive: false});
    can
